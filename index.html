<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AECA-SIG</title>
    <style>
        /* Estilos Globales */
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2A3180;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Contenedor de Logos Superiores */
        .header-logos {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 50px;
            box-sizing: border-box;
            z-index: 10;
        }

        /* AJUSTE DE LOGOS: Aquí controlamos el tamaño */
        .logo {
            width: 200px; /* Tamaño controlado */
            max-width: 25vw; /* Para que no sean gigantes en móviles */
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0px 8px 15px rgba(0,0,0,0.3));
        }

        /* Contenedor del Botón Central */
        .main-content {
            text-align: center;
            z-index: 5;
        }

        .btn-sig-container {
            position: relative;
            display: inline-block;
        }

        .btn-sig {
            display: inline-block;
            padding: 20px 50px;
            font-size: 1.4rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #2A3180, #00c6ff);
            border: none;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            position: relative;
            z-index: 2;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-sig:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 123, 255, 0.6);
        }

        /* Animación de Ondas */
        .btn-sig-container::before,
        .btn-sig-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50px;
            background-color: rgba(0, 198, 255, 0.4);
            z-index: 1;
            opacity: 0;
            animation: pulse-wave 2.5s infinite linear;
        }

        .btn-sig-container::after {
            animation-delay: 1.2s;
        }

        @keyframes pulse-wave {
            0% {
                width: 100%;
                height: 100%;
                opacity: 0.6;
            }
            100% {
                width: 160%;
                height: 250%;
                opacity: 0;
            }
        }

        /* Ajuste para pantallas pequeñas */
        @media (max-width: 600px) {
            .header-logos {
                padding: 0 20px;
                top: 10px;
            }
            .logo {
                width: 120px;
            }
            .btn-sig {
                padding: 15px 30px;
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <header class="header-logos">
        <img src="https://personasausentes.minterior.gub.uy/sites/default/files/guia_practica/ministerio%20del%20interior.jpeg" alt="Ministerio" class="logo">
        <img src="https://pbs.twimg.com/media/GusyGVJWMAAC_Ud.jpg" alt="SIG" class="logo">
    </header>

    <main class="main-content">
        <div class="btn-sig-container">
            <a href="https://ejemplo.com/tu-mapa-sig" class="btn-sig">
                Acceder al Visor Geográfico
            </a>
        </div>
    </main>

</body>
</html>
