<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AECA-SIG</title>
    <style>
        /* Estilos Globales */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2A3180; /* Color de fondo suave */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Evita barras de desplazamiento */
        }


       /* Contenedor de Logos Superiores con más aire */
.header-logos {
    position: absolute;
    top: 25px;         /* Aumentamos la distancia desde el borde superior de la pantalla */
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 0 40px;   /* 0 arriba/abajo, 40px a los lados */
    box-sizing: border-box;
    z-index: 10;       /* Asegura que siempre se vean */
}

.logo {
    width: 250px;      /* Puedes ajustar el ancho aquí */
    height: auto;
    object-fit: contain;
    /* Opcional: añade una sombra suave para que no se vean planos */
    filter: drop-shadow(0px 8px 15px rgba(0,0,0,0.2));
}
        /* --- Contenedor del Botón Central --- */
        .main-content {
            text-align: center;
        }

        /* --- El Botón Interactivo con Efecto de Onda --- */
        .btn-sig-container {
            position: relative;
            display: inline-block;
        }

        .btn-sig {
            display: inline-block;
            padding: 18px 45px;
            font-size: 1.3rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #2A3180, #00c6ff); /* Gradiente azul moderno */
            border: none;
            border-radius: 50px;
            text-decoration: none;
            cursor: pointer;
            position: relative;
            z-index: 2; /* Por encima de las ondas */
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.3);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-sig:hover {
            transform: scale(1.03);
            box-shadow: 0 6px 20px rgba(0, 123, 255, 0.5);
        }

        .btn-sig:active {
            transform: scale(0.98);
        }

        /* --- Animación de Ondas (Pulsaciones) --- */
        .btn-sig-container::before,
        .btn-sig-container::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            border-radius: 50px;
            background-color: rgba(0, 123, 255, 0.6); /* Color de la onda */
            z-index: 1; /* Por debajo del botón */
            opacity: 0;
            animation: pulse-wave 2s infinite linear;
        }

        /* Retraso para la segunda onda */
        .btn-sig-container::after {
            animation-delay: 1s;
        }

        @keyframes pulse-wave {
            0% {
                width: 100%;
                height: 100%;
                opacity: 0.7;
            }
            100% {
                width: 150%;
                height: 180%;
                opacity: 0;
            }
        }

    </style>
</head>
<body>

    <header class="header-logos">
        <img src="https://personasausentes.minterior.gub.uy/sites/default/files/guia_practica/ministerio%20del%20interior.jpeg" alt="Logo de la Institución/Empresa" class="logo">
        
        <img src="https://pbs.twimg.com/media/GusyGVJWMAAC_Ud.jpg" alt="Logo de SIG/Proyecto" class="logo">
    </header>

    <main class="main-content">
        <div class="btn-sig-container">
            <a href="https://ejemplo.com/tu-mapa-sig" class="btn-sig">
                Acceder al Visor Geográfico
            </a>
        </div>
    </main>

</body>

</html>
